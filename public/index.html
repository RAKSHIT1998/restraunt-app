<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h1 class="mb-4">Restaurant Dashboard</h1>
  <div class="mb-3">
    <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#signupModal">Signup</button>
    <button class="btn btn-secondary me-2" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
    <button class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#menuModal">Add Menu Item</button>
    <button class="btn btn-warning me-2" data-bs-toggle="modal" data-bs-target="#orderModal">Create Order</button>
    <button class="btn btn-info" id="refreshOrders">View Orders</button>
  </div>
  <ul class="list-group" id="orderList"></ul>

  <!-- Signup Modal -->
  <div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Signup</h5></div>
        <div class="modal-body">
          <input type="text" id="signupUser" class="form-control mb-2" placeholder="Username">
          <input type="password" id="signupPass" class="form-control" placeholder="Password">
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="signupBtn">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Login</h5></div>
        <div class="modal-body">
          <input type="text" id="loginUser" class="form-control mb-2" placeholder="Username">
          <input type="password" id="loginPass" class="form-control" placeholder="Password">
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="loginBtn">Login</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Menu Modal -->
  <div class="modal fade" id="menuModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Add Menu Item</h5></div>
        <div class="modal-body">
          <input type="text" id="itemName" class="form-control mb-2" placeholder="Item Name">
          <input type="number" id="itemPrice" class="form-control" placeholder="Price">
        </div>
        <div class="modal-footer">
          <button class="btn btn-success" id="addItemBtn">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Order Modal -->
  <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Create Order</h5></div>
        <div class="modal-body">
          <input type="text" id="customerName" class="form-control mb-2" placeholder="Customer Name">
          <input type="text" id="itemIds" class="form-control" placeholder="Menu Item IDs comma separated">
        </div>
        <div class="modal-footer">
          <button class="btn btn-warning" id="createOrderBtn">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bill Modal -->
  <div class="modal fade" id="billModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Bill</h5></div>
        <div class="modal-body" id="billBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
